[project]
name = "core"
version = "0.1.0"
description = "Shared library: models, abstract scrapers/enrichers, DB repository, HTTP client, logging"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0.51",
    "curl-cffi>=0.15.0",
    "pydantic>=2.13.0",
    "docling>=2.113.0",
    "onnxruntime>=1.27.0",
    "sentence-transformers>=3.4.0",
    "sentencex",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/core"]
