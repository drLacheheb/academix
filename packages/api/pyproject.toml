[project]
name = "api"
version = "0.1.0"
description = "FastAPI gateway: endpoints, auth, rate limiting, health monitoring"
requires-python = ">=3.11"
dependencies = [
    "core",
    "fastapi[standard]>=0.139.0",
    "slowapi>=0.1.10",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/api"]
