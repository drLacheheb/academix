[project]
name = "translation"
version = "0.1.0"
description = "Parallelizable local translation worker communicating via REST API"
requires-python = ">=3.11"
dependencies = [
    "core",
    "httpx>=0.28.0",
    "ctranslate2>=4.5.0",
    "sentencepiece>=0.2.0",
    "python-dotenv>=1.2.2",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_translation"]
