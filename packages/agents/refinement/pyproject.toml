[project]
name = "refinement"
version = "0.1.0"
description = "Parallelizable LLM refinement worker communicating via REST API"
requires-python = ">=3.11"
dependencies = [
    "core",
    "httpx>=0.28.0",
    "transformers>=4.48.0",
    "torch>=2.2.0",
    "accelerate>=0.26.0",
    "huggingface_hub>=1.21.0",
    "python-dotenv>=1.2.2",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_refinement"]
