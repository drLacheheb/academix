[project]
name = "refinement"
version = "0.1.0"
description = "Parallelizable LLM refinement worker communicating via REST API"
requires-python = "==3.12.*"
dependencies = [
    "core[embeddings]",
    "httpx>=0.28.0",
    "llama-cpp-python>=0.3.0",
    "python-dotenv>=1.2.2",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_refinement"]
