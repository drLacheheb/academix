[project]
name = "lang-detection"
version = "0.1.0"
description = "Parallelizable language detection worker communicating via REST API"
requires-python = ">=3.11, <3.14"
dependencies = [
    "core",
    "httpx>=0.28.0",
    "fast-langdetect>=1.0.0",
    "python-dotenv>=1.2.2",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_lang_detection"]
