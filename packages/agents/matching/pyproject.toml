[project]
name = "matching"
version = "0.1.0"
description = "Background matching and semantic ranking agent using local embeddings and LLM match explainer"
requires-python = "==3.12.*"
dependencies = [
    "core",
    "httpx>=0.28.0",
    "llama-cpp-python>=0.3.0",
    "python-dotenv>=1.2.2",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_matching"]
