[project]
name = "cv-parsing"
version = "0.1.0"
description = "Background CV parsing and multilingual layout analysis agent using local Docling, NLLB, and Gemma-4"
requires-python = "==3.12.*"
dependencies = [
    "core[embeddings,vision]",
    "httpx>=0.28.0",
    "llama-cpp-python>=0.3.0",
    "python-dotenv>=1.2.2",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_cv_parsing"]
