services:
  # 1. FastAPI Gateway & Database Orchestrator
  api:
    build: .
    volumes:
      - ./data:/app/data
      - ./data/uploads:/app/uploads
      - ./models:/app/models
      - ./logs:/app/logs
      - ./packages:/app/packages
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/models
      - LOG_FILE=/app/logs/api.log
      - DATABASE_URL=${DATABASE_URL:-sqlite:///file:/app/data/jobs.db?nolock=1&uri=true}
      - API_SECRET_KEY=${API_SECRET_KEY:-dev_secret_key}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v1.5}
      - MODELS_DIR=${MODELS_DIR:-/app/models}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - S3_REGION=${S3_REGION:-us-east-1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # 2. Euraxess Discovery Scraper (Continuous schedule)
  crawler-euraxess-discovery:
    build: .
    command: ["uv", "run", "--package", "euraxess-discovery", "python", "-m", "euraxess_discovery.main"]
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./packages:/app/packages
    environment:
      - LOG_FILE=/app/logs/crawler-euraxess-discovery.log
      - API_URL=http://api:8000
      - API_TOKEN=${API_TOKEN:-dev_token}
      - MAX_PAGES=${MAX_PAGES:-5}
      - MAX_SAFETY_PAGES=${MAX_SAFETY_PAGES:-500}
      - CRAWL_ONCE=${CRAWL_ONCE:-false}
      - CRAWL_INTERVAL=${CRAWL_INTERVAL:-3600}
    restart: unless-stopped

  # 3. AcademicTransfer Discovery Scraper (Continuous schedule)
  crawler-academictransfer-discovery:
    build: .
    command: ["uv", "run", "--package", "academictransfer-discovery", "python", "-m", "academictransfer_discovery.main"]
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./packages:/app/packages
    environment:
      - LOG_FILE=/app/logs/crawler-academictransfer-discovery.log
      - API_URL=http://api:8000
      - API_TOKEN=${API_TOKEN:-dev_token}
      - MAX_PAGES=${MAX_PAGES:-5}
      - MAX_SAFETY_PAGES=${MAX_SAFETY_PAGES:-500}
      - CRAWL_ONCE=${CRAWL_ONCE:-false}
      - CRAWL_INTERVAL=${CRAWL_INTERVAL:-3600}
    restart: unless-stopped

  # 4. Euraxess Sourcing Scraper (Continuous polling queue)
  crawler-euraxess-sourcing:
    build: .
    command: ["uv", "run", "--package", "euraxess-sourcing", "python", "-m", "euraxess_sourcing.main"]
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./packages:/app/packages
    environment:
      - LOG_FILE=/app/logs/crawler-euraxess-sourcing.log
      - API_URL=http://api:8000
      - API_TOKEN=${API_TOKEN:-dev_token}
      - CRAWL_ONCE=${CRAWL_ONCE:-false}
      - CRAWL_INTERVAL=${CRAWL_INTERVAL:-15}
    restart: unless-stopped

  # 5. AcademicTransfer Sourcing Scraper (Continuous polling queue)
  crawler-academictransfer-sourcing:
    build: .
    command: ["uv", "run", "--package", "academictransfer-sourcing", "python", "-m", "academictransfer_sourcing.main"]
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./packages:/app/packages
    environment:
      - LOG_FILE=/app/logs/crawler-academictransfer-sourcing.log
      - API_URL=http://api:8000
      - API_TOKEN=${API_TOKEN:-dev_token}
      - CRAWL_ONCE=${CRAWL_ONCE:-false}
      - CRAWL_INTERVAL=${CRAWL_INTERVAL:-15}
    restart: unless-stopped

  # 6. Language Detection worker
  lang-detection-worker:
    build: .
    command: ["uv", "run", "--package", "lang-detection", "python", "-m", "agent_lang_detection.main"]
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./packages:/app/packages
    environment:
      - LOG_FILE=/app/logs/lang-detection-worker.log
      - API_URL=http://api:8000
      - API_TOKEN=${API_TOKEN:-dev_token}
      - AGENT_POLL_INTERVAL=${AGENT_POLL_INTERVAL:-10}
    restart: unless-stopped

  # 7. Local NLLB Translation worker
  translation-worker:
    build: .
    command: ["uv", "run", "--package", "translation", "python", "-m", "agent_translation.main"]
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./packages:/app/packages
    environment:
      - HF_HOME=/app/models
      - LOG_FILE=/app/logs/translation-worker.log
      - API_URL=http://api:8000
      - API_TOKEN=${API_TOKEN:-dev_token}
      - MODELS_DIR=${MODELS_DIR:-/app/models}
      - NLLB_MODEL_PATH=${NLLB_MODEL_PATH:-mijuanlo/nllb-200-distilled-600M-ct2-int8}
      - AGENT_POLL_INTERVAL=${AGENT_POLL_INTERVAL:-10}
    restart: unless-stopped

  # 8. Gemma-4 Metadata Refinement worker
  refinement-worker:
    build: .
    command: ["uv", "run", "--package", "refinement", "python", "-m", "agent_refinement.main"]
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./packages:/app/packages
    environment:
      - HF_HOME=/app/models
      - LOG_FILE=/app/logs/refinement-worker.log
      - API_URL=http://api:8000
      - API_TOKEN=${API_TOKEN:-dev_token}
      - MODELS_DIR=${MODELS_DIR:-/app/models}
      - MODEL_PATH=${MODEL_PATH:-unsloth/gemma-4-E2B-it-GGUF/gemma-4-E2B-it-Q4_K_M.gguf}
      - AGENT_POLL_INTERVAL=${AGENT_POLL_INTERVAL:-10}
    restart: unless-stopped

  # 9. Matching and Explanations worker
  matching-worker:
    build: .
    command: ["uv", "run", "--package", "matching", "python", "-m", "agent_matching.main"]
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - LOG_FILE=/app/logs/matching-worker.log
      - API_URL=http://api:8000
      - API_TOKEN=${API_TOKEN:-dev_token}
      - MODELS_DIR=${MODELS_DIR:-/app/models}
      - AGENT_POLL_INTERVAL=${AGENT_POLL_INTERVAL:-15}
    restart: unless-stopped

  # 10. CV Ingestion and Parsing worker
  cv-parsing-worker:
    build: .
    command: ["uv", "run", "--package", "cv-parsing", "python", "-m", "agent_cv_parsing.main"]
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./data/uploads:/app/uploads
      - ./logs:/app/logs
      - ./packages:/app/packages
    environment:
      - HF_HOME=/app/models
      - LOG_FILE=/app/logs/cv-parsing-worker.log
      - API_URL=http://api:8000
      - API_TOKEN=${API_TOKEN:-dev_token}
      - MODELS_DIR=${MODELS_DIR:-/app/models}
      - MODEL_PATH=${MODEL_PATH:-unsloth/gemma-4-E2B-it-GGUF/gemma-4-E2B-it-Q4_K_M.gguf}
      - NLLB_MODEL_PATH=${NLLB_MODEL_PATH:-mijuanlo/nllb-200-distilled-600M-ct2-int8}
      - AGENT_POLL_INTERVAL=${AGENT_POLL_INTERVAL:-10}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - S3_REGION=${S3_REGION:-us-east-1}
    restart: unless-stopped

# Local host directories ./logs and ./models are used for storage and model persistence
